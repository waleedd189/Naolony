<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Naolon - أرشيف النقلات</title>
    
    <!-- 🎨 PWA Meta Tags -->
    <meta name="theme-color" content="#10b981">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Naolon">
    
    <!-- 📱 Manifest & Icons -->
    <link rel="manifest" href="/Naolony/manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="/Naolony/icons/icon-192.png">
    <link rel="apple-touch-icon" sizes="192x192" href="/Naolony/icons/icon-512.png">
    
    <!-- 📝 Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <!-- 🎯 Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('/Naolony/sw.js')
                    .then(function(registration) {
                        console.log('✅ Service Worker مسجل:', registration.scope);
                    })
                    .catch(function(error) {
                        console.log('❌ فشل تسجيل SW:', error);
                    });
            });
        }
    </script>
    
    <style>
        *{font-family:Cairo,sans-serif;margin:0;padding:0;box-sizing:border-box}
        body{background:#0a0f1a;color:#f3f4f6;min-height:100vh;padding:20px}
        .header{text-align:center;padding:40px 20px 30px}
        .logo{width:80px;height:80px;background:linear-gradient(135deg,#10b981,#059669);border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:40px;margin:0 auto 16px;box-shadow:0 10px 40px rgba(16,185,129,0.3)}
        h1{font-size:28px;font-weight:900;color:white}
        .sub{color:#10b981;font-size:14px;margin-top:6px}
        .line{width:60px;height:3px;background:linear-gradient(90deg,#10b981,#059669);border-radius:3px;margin:16px auto}
        .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;max-width:900px;margin:0 auto;padding-bottom:40px}
        .card{background:linear-gradient(135deg,rgba(26,35,50,0.95),rgba(17,24,39,0.98));border:1px solid rgba(16,185,129,0.25);border-radius:20px;padding:24px;display:flex;align-items:center;gap:16px;text-decoration:none;transition:all 0.3s}
        .card:hover{transform:translateY(-4px);border-color:#10b981;box-shadow:0 20px 40px rgba(16,185,129,0.2)}
        .card-icon{font-size:36px;flex-shrink:0}
        .card-label{font-size:20px;font-weight:800;color:white;flex:1}
        .card-arrow{color:#10b981;font-size:22px;font-weight:bold}
        
        /* Footer بسيط وواضح */
        .footer{text-align:center;color:#374151;font-size:12px;padding:25px 20px}
        .footer-main{font-size:13px;color:#6b7280;margin-bottom:5px}
        .footer-dev{font-size:12px;color:#4b5563;margin-top:5px}
        .footer-dev-name{color:#10b981;font-weight:700}
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">🚛</div>
        <h1>نظام نقلات Naolon</h1>
        <p class="sub">اختار الشهر عشان تشوف نقلاتك</p>
        <div class="line"></div>
    </div>
    
    <div class="grid">
        <a href="naolon-salary-يناير-2026.html" class="card">
            <span class="card-icon">📋</span>
            <span class="card-label">يناير 2026</span>
            <span class="card-arrow">←</span></a>
        <a href="naolon-salary-فبراير-2026.html" class="card">
            <span class="card-icon">📋</span>
            <span class="card-label">فبراير 2026</span>
            <span class="card-arrow">←</span></a>
        <a href="naolon-salary-مارس-2026.html" class="card">
            <span class="card-icon">📋</span>
            <span class="card-label">مارس 2026</span>
            <span class="card-arrow">←</span></a>
    </div>
    
    <!-- Footer -->
    <div class="footer">
        <div class="footer-main">🚛 Naolon Transport © 2026</div>
        <div class="footer-dev">By <span class="footer-dev-name">Waleed Salah</span> • Version 1.0.0</div>
    </div>

</html>
